name: Deploy PWA to Codeberg Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare PWA dist
        run: |
          mkdir -p dist
          # Copy all PWA files (exclude android, backend, node_modules, electron)
          rsync -av \
            --exclude='.git' \
            --exclude='android/' \
            --exclude='backend/' \
            --exclude='node_modules/' \
            --exclude='electron/' \
            --exclude='dist/' \
            --exclude='dist-electron/' \
            . dist/

      - name: Deploy to Codeberg Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish
        uses: codeberg/pages-action@v1
        with:
          token: ${{ secrets.PAGES_TOKEN }}
          branch: pages
          path: dist
